services:
  - type: static
    name: biomic-whiz-landing
    rootDir: .
    buildCommand: npm ci && npm run build:static
    staticPublishPath: static-site-dist
    autoDeploy: true
    envVars:
      - key: STATIC_PORTAL_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
